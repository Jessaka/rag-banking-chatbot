name: Banking RAG Eval CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_eval:
        description: "Run live backend eval against an already configured environment"
        required: false
        default: "false"

jobs:
  unit-eval-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Validate eval datasets and scripts
        run: |
          python -m json.tool evals/datasets/banking_eval_v1.json > /tmp/banking_eval_v1.json
          python -m json.tool evals/datasets/pricing_eval_v1.json > /tmp/pricing_eval_v1.json
          python -m json.tool evals/datasets/ambiguity_eval_v1.json > /tmp/ambiguity_eval_v1.json
          python -m json.tool evals/datasets/source_grounding_eval_v1.json > /tmp/source_grounding_eval_v1.json
          python -m json.tool evals/datasets/formatting_eval_v1.json > /tmp/formatting_eval_v1.json
          python -m py_compile scripts/run_eval.py scripts/compare_eval_reports.py scripts/eval_gate.py
      - name: Run eval unit/regression tests
        run: |
          pytest tests/test_eval_runner.py tests/test_structured_pricing_pipeline.py tests/test_quality_filters.py tests/test_generation_pricing_row.py tests/test_query_classifier.py -q

  live-api-eval:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_eval == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run live eval suite
        env:
          EVAL_API_URL: ${{ vars.EVAL_API_URL }}
        run: |
          test -n "$EVAL_API_URL"
          python scripts/run_eval.py --dataset evals/datasets/pricing_eval_v1.json --api-url "$EVAL_API_URL" --save-report --output-dir evals/runs --timeout 180
          REPORT=$(ls -t evals/runs/banking_eval_*.json | head -1)
          python scripts/eval_gate.py "$REPORT" --thresholds evals/gates/regression_thresholds.json --output evals/runs/gate_result.json
      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        with:
          name: banking-rag-eval-report
          path: evals/runs/
